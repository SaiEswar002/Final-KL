# =====================================================
# Hospital Management System — Application Config
# KLU Final Year Engineering Project
# =====================================================

spring.application.name=hospital-management
server.port=8091

# ---- Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_management_db
spring.datasource.username=root
spring.datasource.password=2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- JWT ----
jwt.secret=KLUHospitalManagementSystemSecretKey2024ForJWT
jwt.expiration=86400000
